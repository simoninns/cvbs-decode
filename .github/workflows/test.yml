name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests (nix flake check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      # nix flake check builds packages.default (cvbsDecoderPkg) and then runs
      # the checks.unit-tests derivation inside the Nix sandbox.
      - name: Run nix flake check
        run: nix flake check --print-build-logs
